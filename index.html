<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBuddy — AI Learning Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{
    --bg:#1b1d23;
    --panel:#23262e;
    --panel-2:#2b2f39;
    --border:#383c47;
    --text:#eceef2;
    --muted:#9aa0ad;
    --accent:#7c9aff;
    --accent-2:#7fe3b4;
    --danger:#ff8585;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .app{
    width:100%;
    max-width:760px;
  }
  header{
    margin-bottom:24px;
  }
  header h1{
    font-size:1.6rem;
    margin:0 0 4px 0;
    letter-spacing:-0.02em;
  }
  header p{
    margin:0;
    color:var(--muted);
    font-size:0.95rem;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }

  label{
    display:block;
    font-size:0.8rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin-bottom:8px;
  }

  select, textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:12px;
    font-size:0.95rem;
    font-family:inherit;
  }
  select:focus, textarea:focus, button:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }

  textarea{
    resize:vertical;
    min-height:110px;
    margin-top:14px;
  }

  .feature-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:8px;
  }
  .feature-btn{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-size:0.85rem;
    text-align:left;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .feature-btn:hover{
    border-color:var(--accent);
  }
  .feature-btn.active{
    background:rgba(124,154,255,0.15);
    border-color:var(--accent);
    color:var(--accent);
    font-weight:600;
  }

  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:16px;
  }

  .error-text{
    color:var(--danger);
    font-size:0.85rem;
    min-height:1.2em;
  }

  button.submit{
    background:var(--accent);
    border:none;
    color:#11131a;
    font-weight:700;
    padding:11px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:0.95rem;
  }
  button.submit:disabled{
    opacity:0.5;
    cursor:not-allowed;
  }
  button.submit:hover:not(:disabled){
    filter:brightness(1.08);
  }

  .history{
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .turn{
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .turn-q{
    padding:12px 16px;
    background:var(--panel-2);
    font-size:0.85rem;
    color:var(--muted);
    border-bottom:1px solid var(--border);
  }
  .turn-q .tag{
    display:inline-block;
    background:rgba(124,154,255,0.15);
    color:var(--accent);
    padding:2px 8px;
    border-radius:5px;
    font-size:0.72rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-right:8px;
  }
  .turn-q .qtext{
    color:var(--text);
  }
  .turn-a{
    padding:16px;
    line-height:1.6;
    font-size:0.95rem;
  }
  .turn-a p:first-child{margin-top:0;}
  .turn-a p:last-child{margin-bottom:0;}
  .turn-a code{
    background:var(--panel-2);
    padding:1px 5px;
    border-radius:4px;
    font-size:0.88em;
  }
  .turn-a pre{
    background:var(--panel-2);
    padding:12px;
    border-radius:8px;
    overflow-x:auto;
  }

  .empty-state{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:0.9rem;
  }

  .loading{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px;
    color:var(--muted);
    font-size:0.9rem;
  }
  .spinner{
    width:16px;
    height:16px;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  @media (prefers-reduced-motion: reduce){
    .spinner{ animation:none; }
  }

  footer{
    text-align:center;
    color:var(--muted);
    font-size:0.78rem;
    margin-top:24px;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>StudyBuddy</h1>
    <p>Pick a tool, paste your text, get an instant AI response.</p>
  </header>

  <div class="card">
    <label>Choose a feature</label>
    <div class="feature-grid" id="featureGrid"></div>

    <textarea id="userInput" placeholder="Type or paste your text here..."></textarea>

    <div class="row">
      <span class="error-text" id="errorText"></span>
      <button class="submit" id="submitBtn">Generate →</button>
    </div>
  </div>

  <div class="card" id="resultsCard">
    <label>Results</label>
    <div class="history" id="history">
      <div class="empty-state" id="emptyState">No results yet — pick a feature above and hit Generate.</div>
    </div>
  </div>

  <footer>Built for Task 1: AI Tool Assignment · Powered by Google Gemini</footer>
</div>

<script>
// =========================================================
// 1. CONFIG — put your API key here
// =========================================================
const GEMINI_API_KEY = "";
const GEMINI_MODEL = "gemini-2.5-flash";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;

// =========================================================
// 2. FEATURES — each one is a name + a prompt template
//    {input} gets replaced with whatever the user typed
// =========================================================
const FEATURES = [
  {
    id: "explain",
    label: "Explain a Concept",
    prompt: (input) => `Explain the following concept clearly and accurately, in a few short paragraphs suitable for a student:\n\n${input}`
  },
  {
    id: "summarize",
    label: "Summarize Text",
    prompt: (input) => `Summarize the following text in 3-5 concise sentences, keeping the key points:\n\n${input}`
  },
  {
    id: "quiz",
    label: "Generate Quiz Questions",
    prompt: (input) => `Based on the following text, write 5 quiz questions (mix of multiple choice and short answer) with the correct answers listed at the end:\n\n${input}`
  },
  {
    id: "bullets",
    label: "Bullet Points",
    prompt: (input) => `Convert the following text into a clear, well-organized bulleted list:\n\n${input}`
  },
  {
    id: "eli5",
    label: "Explain Like I'm 5",
    prompt: (input) => `Explain the following in extremely simple terms, as if talking to a 5 year old, using a simple analogy:\n\n${input}`
  },
  {
    id: "flashcards",
    label: "Generate Flashcards",
    prompt: (input) => `Create 5 flashcards from the following text. Format each as:\nQ: [question]\nA: [answer]\n\nText:\n${input}`
  }
];

let selectedFeature = FEATURES[0];

// =========================================================
// 3. BUILD THE FEATURE BUTTONS
// =========================================================
const grid = document.getElementById("featureGrid");
FEATURES.forEach((f, i) => {
  const btn = document.createElement("button");
  btn.className = "feature-btn" + (i === 0 ? " active" : "");
  btn.textContent = f.label;
  btn.dataset.id = f.id;
  btn.addEventListener("click", () => {
    selectedFeature = f;
    document.querySelectorAll(".feature-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
  grid.appendChild(btn);
});

// =========================================================
// 4. MAIN SUBMIT LOGIC
// =========================================================
const userInput = document.getElementById("userInput");
const submitBtn = document.getElementById("submitBtn");
const errorText = document.getElementById("errorText");
const history = document.getElementById("history");
const emptyState = document.getElementById("emptyState");

submitBtn.addEventListener("click", handleSubmit);
userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.ctrlKey) handleSubmit();
});

async function handleSubmit() {
  const text = userInput.value.trim();
  errorText.textContent = "";

  // ---- Handle empty input gracefully ----
  if (!text) {
    errorText.textContent = "Please enter some text first.";
    userInput.focus();
    return;
  }

  if (!GEMINI_API_KEY || GEMINI_API_KEY.startsWith("PASTE_")) {
    errorText.textContent = "No API key set. Open index.html and paste your Gemini key in.";
    return;
  }

  if (emptyState) emptyState.remove();

  // Show a loading row
  const loadingId = "loading-" + Date.now();
  const loadingEl = document.createElement("div");
  loadingEl.id = loadingId;
  loadingEl.className = "loading";
  loadingEl.innerHTML = `<div class="spinner"></div> Thinking...`;
  history.prepend(loadingEl);

  submitBtn.disabled = true;
  submitBtn.textContent = "Generating...";

  try {
    const prompt = selectedFeature.prompt(text);
    const responseText = await callGemini(prompt);
    renderTurn(selectedFeature.label, text, responseText);
  } catch (err) {
    renderTurn(selectedFeature.label, text, `⚠️ Error: ${err.message}`, true);
  } finally {
    document.getElementById(loadingId)?.remove();
    submitBtn.disabled = false;
    submitBtn.textContent = "Generate →";
  }
}

// =========================================================
// 5. CALL THE GEMINI API
// =========================================================
async function callGemini(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }]
    })
  });

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    throw new Error(errData?.error?.message || `API request failed (${res.status})`);
  }

  const data = await res.json();
  const output = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!output) throw new Error("No response returned by the model.");
  return output;
}

// =========================================================
// 6. RENDER A RESULT INTO THE CHAT HISTORY
// =========================================================
function renderTurn(featureLabel, question, answer, isError = false) {
  const turn = document.createElement("div");
  turn.className = "turn";

  const qDiv = document.createElement("div");
  qDiv.className = "turn-q";
  qDiv.innerHTML = `<span class="tag">${featureLabel}</span><span class="qtext">${escapeHtml(truncate(question, 140))}</span>`;

  const aDiv = document.createElement("div");
  aDiv.className = "turn-a";
  aDiv.style.color = isError ? "var(--danger)" : "var(--text)";
  aDiv.innerHTML = isError ? escapeHtml(answer) : marked.parse(answer);

  turn.appendChild(qDiv);
  turn.appendChild(aDiv);
  history.prepend(turn);
}

function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + "…" : str;
}
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
